name: Publish Package          # must match the filename: publish.yml

on:
  push:
    branches: [main]
    paths:                     # only run when something publishable changed
      - 'json/**'
      - 'txt/**'
      - 'markdown/**'
      - 'index.*'
      - 'package.json'
  workflow_dispatch:           # manual trigger button

permissions:
  id-token: write              # REQUIRED for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest     # GitHub-hosted only; self-hosted not supported for OIDC
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm test

      # publish only if this version isn't already on the registry
      - name: Publish if new version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          if npm view "fakefilter@$LOCAL" version >/dev/null 2>&1; then
            echo "fakefilter@$LOCAL already published — skipping."
          else
            npm publish
          fi